<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flow · outheis</title>
<style>
@font-face {
  font-family: 'IBM Plex Sans';
  src: url('/assets/fonts/IBMPlexSans-Variable.woff2') format('woff2');
  font-weight: 100 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'IBM Plex Mono';
  src: url('/assets/fonts/IBMPlexMono-Regular.woff2') format('woff2');
  font-weight: 400 500;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
:root {
  --bg: #F0EFEC;
  --bg2: #E8E6E6;
  --text: #1A1A1A;
  --text2: #7A7676;
  --text3: #B8B4B4;
  --accent: #218380;
  --border: #D8D4D4;
  --blocked: #C44;
  --overdue: #E67300;
  --today: #4A90D9;
  --active: #5B8C5A;
  --future: #7A7676;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  height: 100%;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 0.5rem 1rem 1rem;
}

/* Top bar */
.bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
  flex-shrink: 0;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 5px 14px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  background: transparent;
  border: 0.5px solid var(--text3);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn:hover { border-color: var(--text); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: #1a6b6b; }
.refresh-btn {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
}
.refresh-btn:hover { color: var(--text); }
.refresh-btn.spinning { animation: spin 0.6s linear; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Select dropdown */
select {
  font-family: inherit;
  font-size: 13px;
  color: var(--text);
  background: var(--bg2);
  border: 0.5px solid var(--text3);
  border-radius: 6px;
  padding: 5px 10px;
  cursor: pointer;
}
select:focus { outline: none; border-color: var(--accent); }

/* Lane container */
.lanes {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

/* Lane */
.lane {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 4px;
  margin-bottom: 0.5rem;
}
.lane-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg2);
  border-radius: 4px 4px 0 0;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
}
.lane-header:hover { background: #E0DEDE; }
.lane-icon {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.lane-count {
  margin-left: auto;
  font-weight: 400;
  color: var(--text2);
  font-size: 11px;
}
.lane-content {
  padding: 8px;
  display: none;
}
.lane.open .lane-content {
  display: block;
}

/* Lane colors */
.lane-blocked .lane-icon { background: var(--blocked); }
.lane-overdue .lane-icon { background: var(--overdue); }
.lane-today .lane-icon { background: var(--today); }
.lane-active .lane-icon { background: var(--active); }
.lane-future .lane-icon { background: var(--future); }

/* Group */
.group {
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  background: white;
}
.group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--bg2);
  border-radius: 4px 4px 0 0;
  font-weight: 500;
  font-size: 12px;
  cursor: pointer;
}
.group-content {
  padding: 6px 10px 10px;
}

/* Item */
.item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 8px;
  margin: 2px 0;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.1s;
}
.item:hover { background: var(--bg2); }
.item-title {
  flex: 1;
  font-size: 13px;
  line-height: 1.4;
}
.item-meta {
  display: flex;
  gap: 6px;
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.item-facet {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 2px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.item-date {
  color: var(--text2);
}
.item-conflict {
  color: var(--blocked);
  font-weight: 500;
}

/* Dependency indicators */
.dep-indicator {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--text2);
  padding: 1px 4px;
  background: var(--bg2);
  border-radius: 2px;
}
.dep-blocked { color: var(--blocked); background: #FDE8E8; }
.dep-waiting { color: var(--today); }

/* SVG container for dependency arrows */
.arrows-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* Additional styles for popup radios */
.popup-radios {
  display: flex;
  gap: 12px;
  padding-top: 4px;
}
.popup-radios label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  font-size: 13px;
}
</style>
<link rel="stylesheet" href="/assets/css/agenda-popup.css">
</head>
<body>
<div id="app">
  <div class="bar">
    <button class="refresh-btn" id="reloadBtn" onclick="reloadFlow()" title="Reload flow">↻</button>
    <select id="groupSelect" onchange="changeGrouping()">
      <option value="none">No grouping</option>
      <option value="relates">By relation</option>
      <option value="facet">By facet</option>
    </select>
    <select id="filterSelect" onchange="changeFilter()">
      <option value="all">All items</option>
      <option value="blocked">Blocked only</option>
      <option value="overdue">Overdue only</option>
      <option value="undated">Undated only</option>
    </select>
    <button class="btn" onclick="showCreatePopup()">Add item</button>
    <button class="btn" id="saveBtn" onclick="saveFlow()">Save</button>
  </div>

  <div class="lanes" id="lanes">
    <!-- Populated by JavaScript -->
  </div>
</div>

<script src="/assets/js/agenda-popup.js"></script>
<script>
// State
let agendaData = null;
let currentItem = null;
let dirty = false;

// Lane definitions
const LANES = [
  { id: 'blocked', label: 'Blocked', icon: '⚠️' },
  { id: 'overdue', label: 'Overdue', icon: '🔴' },
  { id: 'today', label: 'Today', icon: '🟡' },
  { id: 'active', label: 'Active', icon: '🟢' },
  { id: 'future', label: 'Future', icon: '⚪' }
];

// Initialize
async function init() {
  await reloadFlow();
  initLanes();
}

function initLanes() {
  const container = document.getElementById('lanes');
  container.innerHTML = LANES.map(lane => `
    <div class="lane lane-${lane.id}" id="lane-${lane.id}">
      <div class="lane-header" onclick="toggleLane('${lane.id}')">
        <span class="lane-icon"></span>
        <span>${lane.label}</span>
        <span class="lane-count" id="count-${lane.id}">0</span>
      </div>
      <div class="lane-content" id="content-${lane.id}"></div>
    </div>
  `).join('');
}

function toggleLane(id) {
  document.getElementById(`lane-${id}`).classList.toggle('open');
}

async function reloadFlow() {
  const btn = document.getElementById('reloadBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch('/api/flow-graph?_=' + Date.now());
    agendaData = await res.json();
    renderFlow();
    updateSaveButton();
  } catch (e) {
    console.error('Failed to load flow:', e);
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderFlow() {
  if (!agendaData) return;

  const items = agendaData.items || [];
  const facets = agendaData.facets || [];

  // Categorize items into lanes
  const lanes = {
    blocked: [],
    overdue: [],
    today: [],
    active: [],
    future: []
  };

  const today = new Date().toISOString().slice(0, 10);

  items.forEach(item => {
    const lane = categorizeItem(item, today);
    lanes[lane].push(item);
  });

  // Render each lane
  LANES.forEach(lane => {
    const count = lanes[lane.id].length;
    document.getElementById(`count-${lane.id}`).textContent = count;

    const content = document.getElementById(`content-${lane.id}`);
    if (count === 0) {
      content.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px;">No items</div>';
    } else {
      content.innerHTML = lanes[lane.id].map(item => renderItem(item, facets)).join('');
    }
  });
}

function categorizeItem(item, today) {
  // Check for blocked (effectiveDay > day)
  if (item.effectiveDay !== undefined && item.effectiveDay > (item.day || 0)) {
    return 'blocked';
  }

  const date = item.date || (item.start ? item.start.slice(0, 10) : null);

  // Check for overdue
  if (date && date < today && !item.done) {
    return 'overdue';
  }

  // Check for today
  if (date === today) {
    return 'today';
  }

  // Check for active (undated with action-required)
  if (!date && (item.tags || []).includes('#action-required')) {
    return 'active';
  }

  // Check for future
  if (date && date > today) {
    return 'future';
  }

  // Default to active for undated items
  return 'active';
}

function renderItem(item, facets) {
  const facet = facets.find(f => f.id === item.facet);
  const facetColor = facet ? `background:${facet.hex || '#7A7676'};color:white;` : '';
  const facetLabel = facet ? (facet.label || facet.id) : '';

  const date = item.date || (item.start ? item.start.slice(0, 10) : null);
  const dateStr = date ? formatDate(date) : '';

  const conflict = item.effectiveDay !== undefined && item.effectiveDay > (item.day || 0);

  // Build dependency indicators
  const followsCount = (item.follows || []).length;
  const precedesCount = (item.precedes || []).length;

  let depHtml = '';
  if (followsCount > 0) {
    depHtml += `<span class="dep-indicator ${conflict ? 'dep-blocked' : 'dep-waiting'}">⬅ ${followsCount} waits</span>`;
  }
  if (precedesCount > 0) {
    depHtml += `<span class="dep-indicator">➡ ${precedesCount} blocks</span>`;
  }

  return `
    <div class="item" onclick="editItem('${item.id}')">
      <div style="flex:1">
        <div class="item-title">${escapeHtml(item.title || 'Untitled')}</div>
        <div class="item-meta">
          ${facetLabel ? `<span class="item-facet" style="${facetColor}">${facetLabel}</span>` : ''}
          ${dateStr ? `<span class="item-date">${dateStr}</span>` : ''}
          ${conflict ? `<span class="item-conflict">⚠ conflict</span>` : ''}
          ${depHtml}
        </div>
      </div>
    </div>
  `;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  return `${days[d.getDay()]} ${d.getDate()}.${d.getMonth() + 1}.`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function editItem(id) {
  const item = agendaData.items.find(i => i.id === id);
  if (!item) return;

  AgendaPopup.show({
    item: item,
    allItems: agendaData.items,
    facets: agendaData.facets || [],
    onSave: handlePopupSave,
    getExcludeId: () => item.id
  });
}

function showCreatePopup() {
  AgendaPopup.show({
    item: null,
    allItems: agendaData.items,
    facets: agendaData.facets || [],
    initialDate: new Date().toISOString().slice(0, 10),
    onSave: handlePopupSave
  });
}

function handlePopupSave(itemData, originalItem) {
  // Handle delete
  if (itemData === null && originalItem) {
    const idx = agendaData.items.findIndex(i => i.id === originalItem.id);
    if (idx >= 0) {
      agendaData.items.splice(idx, 1);
      dirty = true;
      updateSaveButton();
      renderFlow();
    }
    return;
  }

  // Build new item
  const newItem = {
    id: originalItem ? originalItem.id : itemData.id,
    title: itemData.title,
    type: itemData.start && itemData.end ? 'fixed' : 'volatile',
    facet: itemData.facet || 'none',
    tags: itemData.extraTags || []
  };

  // Date handling
  if (itemData.date) {
    newItem.date = itemData.date;
    if (itemData.start && itemData.end) {
      newItem.start = itemData.start;
      newItem.end = itemData.end;
    }
  }

  // Size
  if (itemData.size) newItem.size = itemData.size;

  // Dependencies
  if (itemData.follows && itemData.follows.length) newItem.follows = itemData.follows;
  if (itemData.precedes && itemData.precedes.length) newItem.precedes = itemData.precedes;
  if (itemData.relates && itemData.relates.length) newItem.relates = itemData.relates;

  // Update or add item
  if (originalItem) {
    const idx = agendaData.items.findIndex(i => i.id === originalItem.id);
    if (idx >= 0) agendaData.items[idx] = { ...originalItem, ...newItem };
  } else {
    agendaData.items.push(newItem);
  }

  dirty = true;
  updateSaveButton();
  renderFlow();
}

function updateSaveButton() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = dirty ? 'Save' : '✓';
}

async function saveFlow() {
  if (!dirty) return;

  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  try {
    const res = await fetch('/agenda.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: JSON.stringify(agendaData, null, 2) })
    });

    if (res.ok) {
      dirty = false;
      updateSaveButton();
    } else {
      const err = await res.json();
      if (err.conflicts && err.conflicts.length > 0) {
        alert('Conflicts detected:\n' + err.conflicts.map(c => c.reason).join('\n'));
      } else {
        alert('Save failed');
      }
    }
  } catch (e) {
    console.error('Save error:', e);
    alert('Save failed');
  } finally {
    btn.textContent = dirty ? 'Save' : '✓';
    btn.disabled = false;
  }
}

function changeGrouping() {
  // TODO: implement grouping
  renderFlow();
}

function changeFilter() {
  // TODO: implement filtering
  renderFlow();
}

// Initialize on load
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
