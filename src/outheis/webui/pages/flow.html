<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>flow · outheis</title>
<style>
@font-face {
  font-family: 'IBM Plex Sans';
  src: url('/assets/fonts/IBMPlexSans-Variable.woff2') format('woff2');
  font-weight: 100 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'IBM Plex Mono';
  src: url('/assets/fonts/IBMPlexMono-Regular.woff2') format('woff2');
  font-weight: 400 500;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
:root {
  --bg: #F0EFEC;
  --bg2: #E8E6E6;
  --text: #1A1A1A;
  --text2: #7A7676;
  --text3: #B8B4B4;
  --accent: #218380;
  --border: #D8D4D4;
  --blocked: #FF2E00;
  --overdue: #FFB400;
  --today: #C490D1;
  --active: #218380;
  --future: #4A90D9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  height: 100%;
  overflow: hidden;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 0.5rem 1rem 1rem;
}

/* Top bar */
.bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
  flex-shrink: 0;
}
.btn, select {
  height: 28px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  background: transparent;
  border: 0.5px solid var(--text3);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 14px;
}
select {
  background: var(--bg2);
  padding: 0 10px;
}
.btn:hover, select:hover { border-color: var(--text); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: #1a6b6b; }
.refresh-btn {
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  padding: 0 2px;
}
.refresh-btn:hover { color: var(--text); }
.refresh-btn.spinning { animation: spin 0.6s linear; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

select:focus { outline: none; border-color: var(--accent); }

/* Lane container */
.lanes {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

/* Lane */
.lane {
  background: var(--bg);
  border: 0.5px solid var(--border);
  border-radius: 4px;
  margin-bottom: 0.5rem;
}
.lane-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg2);
  border-radius: 4px 4px 0 0;
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
}
.lane-header:hover { background: #E0DEDE; }
.lane-icon {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.lane-count {
  font-weight: 400;
  color: var(--text2);
  font-size: 11px;
  min-width: 20px;
}
.lane-content {
  padding: 8px;
  display: none;
}
.lane.open .lane-content {
  display: block;
}

/* Lane colors */
.lane-blocked .lane-icon { background: var(--blocked); }
.lane-overdue .lane-icon { background: var(--overdue); }
.lane-today .lane-icon { background: var(--today); }
.lane-active .lane-icon { background: var(--active); }
.lane-future .lane-icon { background: var(--future); }

/* Group */
.group {
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  background: white;
}
.group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: var(--bg2);
  border-radius: 4px 4px 0 0;
  font-weight: 500;
  font-size: 12px;
  cursor: pointer;
}
.group-content {
  padding: 6px 10px 10px;
}

/* Item */
.item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 8px;
  margin: 2px 0;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.1s;
}
.item:hover { background: var(--bg2); }
.item-title {
  flex: 1;
  font-size: 13px;
  line-height: 1.4;
}
.item-meta {
  display: flex;
  gap: 6px;
  font-size: 11px;
  color: var(--text2);
  margin-top: 2px;
}
.item-facet {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 2px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.item-date {
  color: var(--text2);
}
.item-conflict {
  color: var(--blocked);
  font-weight: 500;
}

/* Dependency indicators */
.dep-indicator {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--text2);
  padding: 1px 4px;
  background: var(--bg2);
  border-radius: 2px;
}
.dep-blocked { color: var(--blocked); background: #FDE8E8; }
.dep-waiting { color: var(--today); }

/* SVG container for dependency arrows */
.arrows-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 10;
}

/* Additional styles for popup radios */
.popup-radios {
  display: flex;
  gap: 12px;
  padding-top: 4px;
}
.popup-radios label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  font-size: 13px;
}
</style>
<link rel="stylesheet" href="/assets/css/agenda-popup.css">
</head>
<body>
<div id="app">
  <div class="bar">
    <button class="refresh-btn" id="reloadBtn" onclick="reloadFlow()" title="Reload flow">↻</button>
    <select id="groupSelect" onchange="changeGrouping()">
      <option value="none">No grouping</option>
      <option value="relates">By relation</option>
      <option value="facet">By facet</option>
    </select>
    <select id="filterSelect" onchange="changeFilter()">
      <option value="all">All items</option>
      <option value="blocked">Blocked only</option>
      <option value="overdue">Overdue only</option>
      <option value="undated">Undated only</option>
    </select>
    <button class="btn" onclick="showCreatePopup()">Add item</button>
    <button class="btn" id="saveBtn" onclick="saveFlow()">Save</button>
  </div>

  <div class="lanes" id="lanes">
    <!-- Populated by JavaScript -->
  </div>
</div>

<script src="/assets/js/agenda-popup.js"></script>
<script>
// State
let agendaData = null;
let currentItem = null;
let dirty = false;

// Lane definitions with CI colors
const LANES = [
  { id: 'active', label: 'Active', color: '#218380' },
  { id: 'overdue', label: 'Overdue', color: '#FFB400' },
  { id: 'today', label: 'Today', color: '#C490D1' },
  { id: 'future', label: 'Future', color: '#4A90D9' },
  { id: 'blocked', label: 'Blocked', color: '#FF2E00' }
];

// Initialize
async function init() {
  initLanes();
  await reloadFlow();
}

// Reload when page becomes visible
window.addEventListener('pageshow', () => {
  reloadFlow();
});

function initLanes() {
  const container = document.getElementById('lanes');
  container.innerHTML = LANES.map(lane => `
    <div class="lane lane-${lane.id}" id="lane-${lane.id}">
      <div class="lane-header" onclick="toggleLane('${lane.id}')" style="--lane-color:${lane.color}">
        <span class="lane-icon" style="background:${lane.color}"></span>
        <span class="lane-count" id="count-${lane.id}">0</span>
        <span>${lane.label}</span>
      </div>
      <div class="lane-content" id="content-${lane.id}"></div>
    </div>
  `).join('');
}

function toggleLane(id) {
  document.getElementById(`lane-${id}`).classList.toggle('open');
}

async function reloadFlow() {
  const btn = document.getElementById('reloadBtn');
  btn.classList.add('spinning');
  try {
    const res = await fetch('/api/flow-graph?_=' + Date.now());
    agendaData = await res.json();
    cleanupPastExceptTags();
    renderFlow();
    updateSaveButton();
  } catch (e) {
    console.error('Failed to load flow:', e);
  } finally {
    btn.classList.remove('spinning');
  }
}

/**
 * Remove past except-tags from recurring items.
 * Except-tags with dates in the past are no longer needed.
 */
function cleanupPastExceptTags() {
  if (!agendaData || !agendaData.items) return;

  const today = new Date().toISOString().slice(0, 10);
  let changed = false;

  agendaData.items.forEach(item => {
    if (!item.tags || !Array.isArray(item.tags)) return;

    // Check if this is a recurring item
    const isRecurring = item.tags.some(t => typeof t === 'string' && t.startsWith('#recurring-'));
    if (!isRecurring) return;

    // Remove except-tags with past dates
    const originalLength = item.tags.length;
    item.tags = item.tags.filter(t => {
      if (typeof t !== 'string' || !t.startsWith('#except-')) return true;
      const date = t.slice(8);
      return date >= today; // Keep only future or today dates
    });

    if (item.tags.length !== originalLength) {
      changed = true;
    }
  });

  // Auto-save if we cleaned up any tags
  if (changed) {
    dirty = true;
    updateSaveButton();
  }
}

function renderFlow() {
  if (!agendaData) return;

  const items = agendaData.items || [];
  const facets = agendaData.facets || [];

  // Categorize items into lanes
  const lanes = {
    blocked: [],
    overdue: [],
    today: [],
    active: [],
    future: []
  };

  const today = new Date().toISOString().slice(0, 10);

  items.forEach(item => {
    const lane = categorizeItem(item, today);
    if (lane && lanes[lane]) {
      lanes[lane].push(item);
    }
  });

  // Sort lanes by date (earliest first)
  const getItemDate = (item) => {
    let date = item.date || (item.start ? item.start.slice(0, 10) : null);
    if (!date && item.tags) {
      const tags = Array.isArray(item.tags) ? item.tags : [];
      const dateTag = tags.find(t => typeof t === 'string' && t.startsWith('#date-'));
      if (dateTag) date = dateTag.slice(6);
    }
    return date || '9999-99-99'; // Items without date go to end
  };

  // Sort overdue and future by date (earliest first)
  lanes.overdue.sort((a, b) => getItemDate(a).localeCompare(getItemDate(b)));
  lanes.future.sort((a, b) => getItemDate(a).localeCompare(getItemDate(b)));

  // Render each lane
  LANES.forEach(lane => {
    const count = lanes[lane.id].length;
    document.getElementById(`count-${lane.id}`).textContent = count;

    const content = document.getElementById(`content-${lane.id}`);
    if (count === 0) {
      content.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px;">No items</div>';
    } else {
      content.innerHTML = lanes[lane.id].map(item => {
        // For recurring items, pass today as instance date
        const itemTags = Array.isArray(item.tags) ? item.tags : [];
        const isRecurring = itemTags.some(t => typeof t === 'string' && t.startsWith('#recurring-'));
        return renderItem(item, facets, isRecurring ? today : null);
      }).join('');
    }
  });
}

function categorizeItem(item, today) {
  // Check for deleted items - exclude them entirely
  if (item.deleted) {
    return null; // Exclude soft-deleted items
  }

  // Check for done items - exclude them entirely
  const itemTags = Array.isArray(item.tags) ? item.tags : [];
  const hasDoneTag = itemTags.some(t => typeof t === 'string' && t.startsWith('#done-'));
  if (item.done || hasDoneTag) {
    return null; // Exclude done items
  }

  // Check for blocked (effectiveDay > day)
  if (item.effectiveDay !== undefined && item.effectiveDay > (item.day || 0)) {
    return 'blocked';
  }

  // Extract date from item.date, item.start, or tags
  let date = item.date || (item.start ? item.start.slice(0, 10) : null);
  if (!date && item.tags) {
    const dateTag = itemTags.find(t => typeof t === 'string' && t.startsWith('#date-'));
    if (dateTag) {
      date = dateTag.slice(6); // Remove '#date-'
    }
  }

  // Check for recurring items - only show in "today"
  const isRecurring = itemTags.some(t => typeof t === 'string' && t.startsWith('#recurring-'));
  if (isRecurring) {
    // Check for exception dates
    const exceptTags = itemTags.filter(t => typeof t === 'string' && t.startsWith('#except-'));
    const exceptDates = exceptTags.map(t => t.slice(8)); // Remove '#except-'

    // If today is an exception date, exclude this item
    if (exceptDates.includes(today)) {
      return null;
    }

    // Recurring items only appear in "today"
    if (date === today) {
      return 'today';
    }
    return null; // Exclude from other categories
  }

  // Check for overdue
  if (date && date < today && !item.done) {
    return 'overdue';
  }

  // Check for today
  if (date === today) {
    return 'today';
  }

  // Check for active (undated with action-required)
  if (!date && (item.tags || []).includes('#action-required')) {
    return 'active';
  }

  // Check for future
  if (date && date > today) {
    return 'future';
  }

  // Default to active for undated items
  return 'active';
}

function renderItem(item, facets, instanceDate) {
  // Find facet - check both item.facet and #facet-xxx tag
  let facetId = item.facet;
  if (!facetId || facetId === 'none') {
    const tags = Array.isArray(item.tags) ? item.tags : [];
    const facetTag = tags.find(t => typeof t === 'string' && t.startsWith('#facet-'));
    if (facetTag) {
      facetId = facetTag.slice(7); // Remove '#facet-'
    }
  }
  const facet = facets.find(f => f.id === facetId);

  // Get facet color and label
  const facetColor = facet?.hex ? `background:${facet.hex};color:white;` : '';
  const facetLabel = facet?.label || facet?.id || '';

  // Extract date from item.date, item.start, or tags
  let date = item.date || (item.start ? item.start.slice(0, 10) : null);
  if (!date && item.tags) {
    const tags = Array.isArray(item.tags) ? item.tags : [];
    const dateTag = tags.find(t => typeof t === 'string' && t.startsWith('#date-'));
    if (dateTag) {
      date = dateTag.slice(6);
    }
  }
  // For recurring items, use the instance date (today)
  if (!date && instanceDate) {
    date = instanceDate;
  }
  const dateStr = date ? formatDate(date) : '';

  const conflict = item.effectiveDay !== undefined && item.effectiveDay > (item.day || 0);

  // Build dependency indicators
  const followsCount = (item.follows || []).length;
  const precedesCount = (item.precedes || []).length;

  let depHtml = '';
  if (followsCount > 0) {
    depHtml += `<span class="dep-indicator ${conflict ? 'dep-blocked' : 'dep-waiting'}">⬅ ${followsCount} waits</span>`;
  }
  if (precedesCount > 0) {
    depHtml += `<span class="dep-indicator">➡ ${precedesCount} blocks</span>`;
  }

  // Pass instance date to editItem for recurring items
  const dataAttr = instanceDate ? `data-instance-date="${instanceDate}"` : '';

  return `
    <div class="item" onclick="editItem('${item.id}', ${instanceDate ? `'${instanceDate}'` : 'null'})">
      <div style="flex:1">
        <div class="item-title">${escapeHtml(item.title || 'Untitled')}</div>
        <div class="item-meta">
          ${facetLabel ? `<span class="item-facet" style="${facetColor}">${facetLabel}</span>` : ''}
          ${dateStr ? `<span class="item-date">${dateStr}</span>` : ''}
          ${conflict ? `<span class="item-conflict">⚠ conflict</span>` : ''}
          ${depHtml}
        </div>
      </div>
    </div>
  `;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  return `${days[d.getDay()]} ${d.getDate()}.${d.getMonth() + 1}.`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function editItem(id, instanceDate) {
  const item = agendaData.items.find(i => i.id === id);
  if (!item) return;

  AgendaPopup.show({
    item: item,
    allItems: agendaData.items,
    facets: agendaData.facets || [],
    instanceDate: instanceDate || null,
    onSave: handlePopupSave,
    getExcludeId: () => item.id
  });
}

function showCreatePopup() {
  AgendaPopup.show({
    item: null,
    allItems: agendaData.items,
    facets: agendaData.facets || [],
    initialDate: new Date().toISOString().slice(0, 10),
    onSave: handlePopupSave
  });
}

function handlePopupSave(itemData, originalItem) {
  // Handle delete
  if (itemData === null && originalItem) {
    const idx = agendaData.items.findIndex(i => i.id === originalItem.id);
    if (idx >= 0) {
      agendaData.items.splice(idx, 1);
      dirty = true;
      updateSaveButton();
      renderFlow();
      saveFlow(); // Auto-save on delete
    }
    return;
  }

  // Handle new instance from recurring (standalone copy)
  const isNewInstance = itemData._newInstance;
  if (isNewInstance) {
    delete itemData._newInstance;
  }

  // Build new item
  const newItem = {
    id: isNewInstance ? itemData.id : (originalItem ? originalItem.id : itemData.id),
    title: itemData.title,
    type: itemData.start && itemData.end ? 'fixed' : 'volatile',
    facet: itemData.facet || 'none',
    tags: (itemData.extraTags && itemData.extraTags.length > 0) ? itemData.extraTags : (itemData.tags || [])
  };

  // Check for new facets in tags and add them
  const PRIMARY_COLORS = ['#FF2E00', '#FFB400', '#460A46', '#C490D1', '#97EAD2', '#218380'];
  const SECONDARY_COLORS = ['#00B4D8', '#FF006E', '#00F5D4', '#7400B8', '#4CAF50', '#FFD60A'];
  const GREY = '#7A7676';
  const existingFacetIds = new Set((agendaData.facets || []).map(f => f.id));
  const usedColors = new Set((agendaData.facets || []).map(f => f.hex));

  // Find #facet-xxx tags in the new item
  const allTags = newItem.tags || [];
  allTags.forEach(tag => {
    if (typeof tag === 'string' && tag.startsWith('#facet-')) {
      const facetId = tag.slice(7); // Remove '#facet-'
      if (facetId && facetId !== 'none' && !existingFacetIds.has(facetId)) {
        // Find an unused color (primary first, then secondary, then grey)
        let color = GREY;
        for (const c of PRIMARY_COLORS) {
          if (!usedColors.has(c)) { color = c; break; }
        }
        if (color === GREY) {
          for (const c of SECONDARY_COLORS) {
            if (!usedColors.has(c)) { color = c; break; }
          }
        }
        // Add new facet
        agendaData.facets.push({ id: facetId, label: facetId, hex: color });
        existingFacetIds.add(facetId);
        usedColors.add(color);
      }
    }
  });

  // Handle done
  if (itemData.done) {
    newItem.done = itemData.done;
  }

  // Handle note
  if (itemData.note) {
    newItem.note = itemData.note;
  }

  // Date handling
  if (itemData.date) {
    newItem.date = itemData.date;
    if (itemData.start && itemData.end) {
      newItem.start = itemData.start;
      newItem.end = itemData.end;
    }
  }

  // Size
  if (itemData.size) newItem.size = itemData.size;

  // Dependencies
  if (itemData.follows && itemData.follows.length) newItem.follows = itemData.follows;
  if (itemData.precedes && itemData.precedes.length) newItem.precedes = itemData.precedes;
  if (itemData.relates && itemData.relates.length) newItem.relates = itemData.relates;

  // Update or add item
  if (isNewInstance) {
    // Add as new standalone item
    agendaData.items.push(newItem);

    // Add exception to original recurring item
    if (itemData._instanceDate && originalItem) {
      const exceptTag = `#except-${itemData._instanceDate}`;
      const originalIdx = agendaData.items.findIndex(i => i.id === originalItem.id);
      if (originalIdx >= 0) {
        const originalTags = Array.isArray(agendaData.items[originalIdx].tags)
          ? [...agendaData.items[originalIdx].tags]
          : [];
        if (!originalTags.includes(exceptTag)) {
          originalTags.push(exceptTag);
          agendaData.items[originalIdx].tags = originalTags;
        }
      }
    }
  } else if (originalItem) {
    const idx = agendaData.items.findIndex(i => i.id === originalItem.id);
    if (idx >= 0) agendaData.items[idx] = { ...agendaData.items[idx], ...newItem };
  } else {
    agendaData.items.push(newItem);
  }

  dirty = true;
  updateSaveButton();
  renderFlow();

  // Auto-save after popup save
  saveFlow();
}

function updateSaveButton() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = dirty ? 'Save' : '✓';
}

async function saveFlow() {
  if (!dirty) return;

  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  try {
    const res = await fetch('/agenda.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: JSON.stringify(agendaData, null, 2) })
    });

    if (res.ok) {
      dirty = false;
      updateSaveButton();
    } else {
      const err = await res.json();
      if (err.conflicts && err.conflicts.length > 0) {
        alert('Conflicts detected:\n' + err.conflicts.map(c => c.reason).join('\n'));
      } else {
        alert('Save failed');
      }
    }
  } catch (e) {
    console.error('Save error:', e);
    alert('Save failed');
  } finally {
    btn.textContent = dirty ? 'Save' : '✓';
    btn.disabled = false;
  }
}

function changeGrouping() {
  // TODO: implement grouping
  renderFlow();
}

function changeFilter() {
  // TODO: implement filtering
  renderFlow();
}

// Initialize on load
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
